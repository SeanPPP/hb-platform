<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Platform - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
          --background: #f5f5f5;
          --foreground: #262626;
          --card: #ffffff;
          --primary: #1890ff;
          --radius: 8px;
        }
        
        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: 'Roboto', sans-serif;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            animation: spin 10s linear infinite;
        }
        
        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            animation: fadeInUp 0.5s ease-out;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
            outline: none;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: #147ad6;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }
        
        .social-login {
            margin: 1.5rem 0;
            text-align: center;
        }
        
        .social-login .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 0.25rem;
            transition: all 0.2s ease;
        }
        
        .social-login .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <div class="logo mx-auto">HB</div>
            <h1 class="text-2xl font-bold mb-2">Welcome to HB Platform</h1>
            <p class="text-muted-foreground">Sign in to continue</p>
        </div>

        <div class="login-card">
            <form>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="remember-forgot">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="mr-2">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="text-primary hover:text-primary-darken">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary">Sign in</button>

                <div class="social-login">
                    <p class="mb-2">Or sign in with:</p>
                    <div class="flex justify-center">
                        <button class="social-btn bg-red-500 hover:bg-red-600 text-white">
                            <i data-lucide="chrome"></i>
                        </button>
                        <button class="social-btn bg-blue-600 hover:bg-blue-700 text-white">
                            <i data-lucide="facebook"></i>
                        </button>
                        <button class="social-btn bg-black hover:bg-gray-800 text-white">
                            <i data-lucide="apple"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="signup-link text-center">
            <p>Don't have an account? <a href="#" class="text-primary hover:text-primary-darken font-medium">Sign up now</a></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
