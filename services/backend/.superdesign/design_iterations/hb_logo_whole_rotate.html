<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Logo Design - Whole Rotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }

        :root {
            --hb-primary: #3742fa;
            --hb-secondary: #ff4757;
            --hb-accent: #f59e0b;
            --hb-success: #10b981;
            --hb-text: #ffffff;
            --hb-muted: #6b7280;
            --hb-bg: #ffffff;
            --hb-card: #f9fafb;
        }

        .hb-logo-whole-rotate {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            animation: rotateClockwise 4s linear infinite; /* HB整体顺时针旋转（包含圆） */
            transform-origin: center center;
        }

        .hb-in-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px; /* 间隔小一点 */
            z-index: 2;
        }

        .hb-letters {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px; /* 间隔小一点 */
        }

        .hb-letter-whole-rotate {
            display: inline-block;
            font-size: 72px;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em;
            line-height: 1;
            position: relative;
            cursor: pointer;
            color: white; /* 文本白色 */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        /* 圆形背景渐变 */
        .hb-background-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hb-primary) 0%, var(--hb-secondary) 100%);
            z-index: 1;
            animation: circlePulse 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        @keyframes rotateClockwise {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes circlePulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 30px rgba(255, 71, 87, 0.3);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                box-shadow: 0 0 50px rgba(255, 71, 87, 0.5);
            }
        }

        .hb-letter-whole-rotate:hover {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .logo-container-whole-rotate {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        .logo-card-whole-rotate {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 80px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: cardSlideIn 1.5s ease-out;
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.8);
                filter: blur(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .logo-subtitle-whole-rotate {
            font-size: 24px;
            color: #ffffff;
            margin-top: 32px;
            font-weight: 600;
            letter-spacing: 0.02em;
            animation: textFadeIn 1s ease-out 0.8s both;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .logo-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 16px;
            font-weight: 400;
            line-height: 1.6;
            animation: textFadeIn 1s ease-out 1s both;
        }

        @keyframes textFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.1), rgba(55, 66, 250, 0.1));
            animation: floatShape 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 60px;
            height: 60px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 40px;
            height: 40px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.15), rgba(55, 66, 250, 0.15));
        }

        .shape:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 30px;
            height: 30px;
            top: 30%;
            right: 30%;
            animation-delay: 6s;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.12), rgba(55, 66, 250, 0.12));
        }

        @keyframes floatShape {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.6;
            }
        }

        @media (max-width: 768px) {
            .hb-letter-whole-rotate {
                font-size: 56px;
            }

            .hb-background-circle {
                width: 130px;
                height: 130px;
            }

            .logo-card-whole-rotate {
                padding: 48px;
                margin: 20px;
            }

            .logo-subtitle-whole-rotate {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container-whole-rotate">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>

        <div class="logo-card-whole-rotate">
            <div class="hb-logo-whole-rotate">
                <div class="hb-background-circle"></div>
                <div class="hb-in-circle">
                    <div class="hb-letters">
                        <span class="hb-letter-whole-rotate">H</span>
                        <span class="hb-letter-whole-rotate">B</span>
                    </div>
                </div>
            </div>

            
        </div>
    </div>

    <script>
        // 添加交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const hbWrapper = document.querySelector('.hb-logo-whole-rotate');
            const letters = document.querySelectorAll('.hb-letter-whole-rotate');

            // HB整体的悬停效果（在包含圆和字母的容器上）
            hbWrapper.addEventListener('mouseenter', function() {
                // 鼠标悬停时暂停整体旋转
                this.style.animationPlayState = 'paused';
                // 同时放大背景圆
                const bgCircle = document.querySelector('.hb-background-circle');
                bgCircle.style.transform = 'translate(-50%, -50%) scale(1.1)';
            });

            hbWrapper.addEventListener('mouseleave', function() {
                // 鼠标离开时恢复整体旋转
                this.style.animationPlayState = 'running';
                // 恢复背景圆大小
                const bgCircle = document.querySelector('.hb-background-circle');
                bgCircle.style.transform = 'translate(-50%, -50%) scale(1)';
            });

            // 单个字母的点击效果
            letters.forEach((letter, index) => {
                letter.addEventListener('click', function() {
                    // 点击时添加涟漪效果
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'rgba(255, 255, 255, 0.4)';
                    ripple.style.transform = 'scale(0)';
                    ripple.style.animation = 'ripple 0.8s ease-out';
                    ripple.style.width = '30px';
                    ripple.style.height = '30px';
                    ripple.style.left = '50%';
                    ripple.style.top = '50%';
                    ripple.style.transformOrigin = 'center';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.zIndex = '10';

                    this.appendChild(ripple);

                    setTimeout(() => {
                        ripple.remove();
                    }, 800);

                    // 点击时短暂加速旋转（作用于整个包装容器）
                    hbWrapper.style.animationDuration = '1s';
                    setTimeout(() => {
                        hbWrapper.style.animationDuration = '4s';
                    }, 1000);
                });
            });
        });

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(6);
                    opacity: 0;
                }
            }

            .hb-background-circle {
                transition: transform 0.3s ease;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
