<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Logo Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }

        .hb-logo {
            position: relative;
            display: inline-block;
            width: 200px;
            height: 120px;
        }

        .hb-text {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        .hb-shadow {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: rgba(102, 126, 234, 0.3);
            z-index: -1;
        }

        @keyframes logoGlow {
            from {
                filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5));
                transform: scale(1);
            }
            to {
                filter: drop-shadow(0 0 30px rgba(118, 75, 162, 0.8));
                transform: scale(1.02);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .logo-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: cardSlideIn 1s ease-out;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-subtitle {
            font-size: 18px;
            color: #6b7280;
            margin-top: 16px;
            text-align: center;
            font-weight: 400;
        }

        .brand-accent {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            margin: 20px auto 0;
            animation: accentGrow 2s ease-out 0.5s both;
        }

        @keyframes accentGrow {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 60px;
                opacity: 1;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="logo-container">
        <div class="logo-card">
            <div class="hb-logo">
                <div class="hb-shadow">HB</div>
                <div class="hb-text">HB</div>
            </div>
            <div class="brand-accent"></div>
            <div class="logo-subtitle">HB Platform - Multi-Shop Management System</div>
        </div>
    </div>
</body>
</html>
