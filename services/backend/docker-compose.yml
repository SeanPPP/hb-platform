services:
  hb-api:
    build:
      context: .
      dockerfile: BlazorApp.Api/Dockerfile
    image: blazorapphbweb_hb-api_vite:local
    container_name: hb-platform-vite-api
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5002
      - ASPNETCORE_HTTP_PORTS=5002
      # 生产连接字符串只从服务器 .env 注入，避免把敏感值写入 compose。
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING_DEFAULT}
      - ConnectionStrings__StoreHzgHQConnection=${CONNECTION_STRING_STORE_HQ}
      - ConnectionStrings__HBSalesConnection=${CONNECTION_STRING_SALES}
      - ConnectionStrings__PostgresConnection=${CONNECTION_STRING_POSTGRES}
      - ConnectionStrings__HBPOSMConnection=${CONNECTION_STRING_POSM}
      - ConnectionStrings__HBSalesRecord=${CONNECTION_STRING_SALES_RECORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-BlazorApp}
      - Jwt__Audience=${JWT_AUDIENCE:-BlazorAppUsers}
      - Jwt__ExpireMinutes=${JWT_EXPIRE_MINUTES:-480}
      - Cookie__Secure=${COOKIE_SECURE:-true}
      - Cookie__SameSite=${COOKIE_SAMESITE:-Lax}
      # 中心日志状态与保留策略显式写入生产 compose，外部项目摘要只从 .env 注入。
      - ApplicationLogging__Enabled=true
      - ApplicationLogging__DefaultProjectCode=HBBBackend
      - ApplicationLogging__DefaultEnvironment=Production
      - ApplicationLogging__DefaultSourceType=Backend
      - ApplicationLogging__ServiceName=HBBBackend.Api
      - ApplicationLogging__MinimumLevel=Warning
      - ApplicationLogging__DefaultRetentionDays=7
      - ApplicationLogging__Projects__0__ProjectCode=HBBBackend
      - ApplicationLogging__Projects__0__DisplayName=Web/移动端后端
      - ApplicationLogging__Projects__0__Enabled=true
      - ApplicationLogging__Projects__0__RetentionDays=7
      - ApplicationLogging__Projects__1__ProjectCode=hbweb_rv
      - ApplicationLogging__Projects__1__DisplayName=Web前端
      - ApplicationLogging__Projects__1__Enabled=true
      - ApplicationLogging__Projects__1__RetentionDays=7
      - ApplicationLogging__Projects__1__ApiKeyHash=${CENTER_LOG_HBWEB_RV_KEY_SHA256:?required}
      - ApplicationLogging__Projects__2__ProjectCode=HbwebExpo
      - ApplicationLogging__Projects__2__DisplayName=移动端
      - ApplicationLogging__Projects__2__Enabled=false
      - ApplicationLogging__Projects__2__RetentionDays=7
      - ApplicationLogging__Projects__3__ProjectCode=hbpos_win
      - ApplicationLogging__Projects__3__DisplayName=WPF客户端
      - ApplicationLogging__Projects__3__Enabled=false
      - ApplicationLogging__Projects__3__RetentionDays=30
      - ApplicationLogging__Projects__4__ProjectCode=hbpos_api
      - ApplicationLogging__Projects__4__DisplayName=WPF收银后端
      - ApplicationLogging__Projects__4__Enabled=true
      - ApplicationLogging__Projects__4__RetentionDays=7
      - ApplicationLogging__Projects__4__ApiKeyHash=${CENTER_LOG_HBPOS_API_KEY_SHA256:?required}
      # SMTP 密码密文依赖 DataProtection key ring，必须落到宿主机目录以跨容器重建保留。
      - DataProtection__KeysPath=/app/App_Data/DataProtectionKeys
      # 考勤二维码使用独立 key ring，仅向需要互通的考勤服务共享。
      - AttendanceQrDataProtection__KeysPath=/app/App_Data/AttendanceQrDataProtectionKeys
      # EAS webhook secret 只从服务器 .env 注入；profile 白名单固定允许生产与预览构建回写。
      - EasWebhook__Secret=${EAS_WEBHOOK_SECRET}
      - EasWebhook__AllowedAccountName=${EAS_WEBHOOK_ALLOWED_ACCOUNT_NAME}
      - EasWebhook__AllowedProjectName=${EAS_WEBHOOK_ALLOWED_PROJECT_NAME}
      - EasWebhook__AcceptedProfiles__0=preview
      - EasWebhook__AcceptedProfiles__1=production
      - Translation__Provider=deepseek
      # 生产翻译密钥只从服务器 .env 注入，避免在 compose 中写入明文或占位值。
      - Translation__DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - TencentCloud__SecretId=${TENCENT_SECRET_ID}
      - TencentCloud__SecretKey=${TENCENT_SECRET_KEY}
      - TencentCloud__BucketName=${TENCENT_BUCKET_NAME}
      - TencentCloud__Region=${TENCENT_REGION}
      - TencentCloud__ImageBucketName=${TENCENT_IMAGE_BUCKET_NAME}
      - TencentCloud__ImageRegion=${TENCENT_IMAGE_REGION}
    volumes:
      - hb-api-logs:/app/logs
      - ./data-protection-keys:/app/App_Data/DataProtectionKeys
      - ${ATTENDANCE_QR_DATA_PROTECTION_KEYS_HOST_PATH:?required}:/app/App_Data/AttendanceQrDataProtectionKeys
    restart: unless-stopped
    networks:
      - hb-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hb-network:
    driver: bridge
    name: hb-network

volumes:
  hb-api-logs:
    driver: local
