version: '3.8'

services:
  hb-api:
    build:
      context: .
      dockerfile: BlazorApp.Api/Dockerfile
    image: hb-platform-api:local
    container_name: hb-api
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionString=REDACTED
      - ConnectionString=REDACTED
      - ConnectionString=REDACTED
      - ConnectionString=REDACTED
      - ConnectionString=REDACTED
      - ConnectionString=REDACTED
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-BlazorApp}
      - Jwt__Audience=${JWT_AUDIENCE:-BlazorAppUsers}
      - Jwt__ExpireMinutes=${JWT_EXPIRE_MINUTES:-480}
      - Cookie__Secure=true
      - Cookie__SameSite=Lax
      - Cookie__AccessTokenExpiryMinutes=15
      - Cookie__RefreshTokenExpiryDays=7
      - Translation__Kimi__ApiKey=REDACTED
      - TencentCloud__SecretId=${TENCENT_SECRET_ID}
      - TencentCloud__SecretKey=${TENCENT_SECRET_KEY}
      - TencentCloud__BucketName=${TENCENT_BUCKET_NAME}
      - TencentCloud__Region=${TENCENT_REGION}
      - TencentCloud__ImageBucketName=${TENCENT_IMAGE_BUCKET_NAME}
      - TencentCloud__ImageRegion=${TENCENT_IMAGE_REGION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
