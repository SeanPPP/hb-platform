<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Logo Design - Modern Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }

        :root {
            --hb-primary: #667eea;
            --hb-secondary: #764ba2;
            --hb-accent: #f59e0b;
            --hb-text: #1f2937;
            --hb-muted: #6b7280;
            --hb-bg: #ffffff;
            --hb-card: #f9fafb;
        }

        .hb-logo-modern {
            position: relative;
            display: inline-block;
        }

        .hb-letter {
            display: inline-block;
            font-size: 80px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.03em;
            line-height: 1;
            position: relative;
            transition: all 0.3s ease;
        }

        .hb-letter:hover {
            transform: translateY(-2px);
        }

        .hb-h {
            background: linear-gradient(135deg, var(--hb-primary) 0%, var(--hb-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: hPulse 3s ease-in-out infinite;
        }

        .hb-b {
            background: linear-gradient(135deg, var(--hb-accent) 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bPulse 3s ease-in-out infinite 0.5s;
        }

        .hb-letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .hb-letter:hover::before {
            opacity: 1;
        }

        @keyframes hPulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.6));
            }
        }

        @keyframes bPulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.6));
            }
        }

        .logo-container-modern {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f59e0b 100%);
            position: relative;
            overflow: hidden;
        }

        .logo-container-modern::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: backgroundFloat 6s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            50% {
                transform: translate(-50%, -50%) rotate(180deg);
            }
        }

        .logo-card-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 64px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: cardSlideIn 1.2s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.8);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .logo-subtitle-modern {
            font-size: 20px;
            color: var(--hb-muted);
            margin-top: 24px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .brand-elements {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--hb-primary);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .brand-dot:nth-child(2) {
            background: var(--hb-secondary);
            animation-delay: 0.2s;
        }

        .brand-dot:nth-child(3) {
            background: var(--hb-accent);
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .tagline {
            font-size: 14px;
            color: var(--hb-text);
            text-align: center;
            margin-top: 16px;
            font-weight: 500;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="logo-container-modern">
        <div class="logo-card-modern">
            <div class="hb-logo-modern">
                <span class="hb-letter hb-h">H</span>
                <span class="hb-letter hb-b">B</span>
            </div>
            <div class="logo-subtitle-modern">HB Platform</div>
            <div class="tagline">Multi-Shop Order Management System</div>
            <div class="brand-elements">
                <div class="brand-dot"></div>
                <div class="brand-dot"></div>
                <div class="brand-dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
