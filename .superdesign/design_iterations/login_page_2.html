<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="design_iterations/theme_antdesign.css">
    <style>
        .logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1890ff 0%, #4096ff 100%);
            clip-path: polygon(20% 0%, 80% 0%, 80% 20%, 100% 20%, 100% 80%, 80% 80%, 80% 100%, 20% 100%, 20% 80%, 0% 80%, 0% 20%, 20% 20%);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animated-logo {
            animation: spin 8s linear infinite;
        }
    </style>
</head>
<body class="bg-background">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-card rounded-lg shadow-md p-8 space-y-6">
            <div class="text-center">
                <div class="mx-auto mb-4 flex items-center justify-center">
                    <div class="logo h-16 w-16 text-white flex items-center justify-center">
                        <span class="text-2xl font-bold">HB</span>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-foreground">Welcome to HB Platform</h2>
                <p class="text-muted-foreground mt-2">Sign in to continue</p>
            </div>
            <form class="space-y-4">
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-foreground">Email</label>
                    <input type="email" id="email" class="w-full px-3 py-2 border border-input rounded-md focus:outline-none focus:ring-2 focus:ring-ring">
                </div>
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-foreground">Password</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border border-input rounded-md focus:outline-none focus:ring-2 focus:ring-ring">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center text-sm text-foreground">
                        <input type="checkbox" class="mr-2 rounded border-input text-primary focus:ring-ring">
                        Remember me
                    </label>
                    <a href="#" class="text-sm text-primary hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="w-full py-2 px-4 bg-primary text-primary-foreground rounded-md hover:bg-primary/90 transition-colors duration-200">
                    Sign in
                </button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-sm text-muted-foreground">Or sign in with</p>
                <div class="flex justify-center space-x-4 mt-3">
                    <button class="flex items-center justify-center w-10 h-10 rounded-full border border-border hover:bg-accent transition-colors duration-200">
                        <svg class="w-5 h-5 text-foreground" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.2 3.31v2.74h3.57c2.08-1.92 3.28-4.74 3.28-8.06z" fill="#4285F4"/>
                            <path d="M12 23c2.8 0 5.18-.94 6.9-2.5l-3.47-2.68c-.94.63-2.14 1.0-3.43 1.0-2.64 0-4.89-1.79-5.63-4.2h-3.57v2.71C3.9 16.4 7.3 23 12 23z" fill="#34A853"/>
                            <path d="M5.64 14.52a7.1 7.1 0 0 1 0-4.04v-2.71h-3.57a11.9 11.9 0 0 0 0 10.75l3.57-2.71z" fill="#FBBC05"/>
                            <path d="M12 4.75c1.78 0 3.44.6 4.64 1.8l3.47-3.47C17.82 1.44 14.9 0 12 0 7.3 0 3.9 6.4 3.9 12c0 1.72.43 3.34 1.2 4.75L5.64 14.52A7.1 7.1 0 0 1 5.64 14.52z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button class="flex items-center justify-center w-10 h-10 rounded-full border border-border hover:bg-accent transition-colors duration-200">
                        <svg class="w-5 h-5 text-foreground" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.65 9.12 8.44 9.88.6.11 0 .28 0 .28v2.04c0 .28.16.52.38.44C14.05 22.18 18 18.07 18 12.22c0-3.92-1.3-7.46-3.38-10.07.47 1.08.7 2.25.7 3.47 0 1.21-.23 2.39-.69 3.47H18c.4 4.17-3.22 7.42-7 7.93v5.11h3.66c6.07-1.28 10.76-6.53 10.76-12.43z" fill="#3B5998"/>
                        </svg>
                    </button>
                    <button class="flex items-center justify-center w-10 h-10 rounded-full border border-border hover:bg-accent transition-colors duration-200">
                        <svg class="w-5 h-5 text-foreground" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.43 9.7 8 11.13.59.11.79-.26.79-.58 0-.28-.01-1.02-.01-2.02-2.89.48-3.61-.66-3.89-1.23-.12-.3-.7-.48-1.23-.59-.42-.11-1.02-.6-1.22-.7-.4-.11-.4-.28-.4-.44 0-.28.01-.5.01-.56 0-.55.35-1.11.88-1.5C5.33 10.2 4.03 9.2 3.01 6.6c-.3-.88-.7-1.7-1.34-2.44C1.3 3.28 2.06 3.01 3.01 3.01 3.69 3.01 4.32 3.2 4.88 3.5 1.59 1.08 3.29 1.59 5.09 1.59 1.8 0 3.5-.51 4.89-1.59.96-.72 1.6-1.66 1.6-2.77 0-1.66-.88-3.01-2.09-3.01-.62 0-1.22.33-1.66.67l-.54-.05C6.27 2.09 5.53 0 4.3 0 2.37 0 0 1.55 0 3.01c0 1.79.96 3.45 2.4 4.33.24.16.24.44 0 .6-.11.11-.3.17-.5.17-.2 0-.39-.06-.5-.17C1.46 6.89.8 5.95.8 4.9 0 3.3 1.3 0 3.01 0 4.09 0 5.8.8 6.9 1.8 1.1.99 1.7 2.34 1.7 3.78 0 2.74-2.22 5-5 5-.11 0-.21 0-.32-.02.68-.59 1.19-1.33 1.19-2.16 0-1.05-.57-1.93-1.5-2.35.44 1.3.17 2.3.05 2.6.15.38.24.78.24 1.2 0 1.8-.56 3.4-1.6 4.7-.34.4-.6 1-.6 1.6 0 1.1.66 2 1.48 2.3.44.17.85.26 1.3.26.48 0 .95-.09 1.3-.26.82-.31 1.48-1.01 1.48-1.85 0-1.07-.66-1.93-1.8-2.35.56-.16 1.05-.6 1.05-1.15 0-.8-.55-1.59-1.5-1.59-1.14 0-2.04.9-2.04 2.04 0 .78.34 1.47.9 1.93.17.14.36.26.56.35-.38.18-.8.5-.8.5z" fill="#000000"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="text-center">
                <p class="text-sm text-muted-foreground">Don't have an account? <a href="#" class="text-primary hover:underline">Sign up now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
