<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB Logo Design - Complete Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }

        :root {
            --hb-primary: #ff4757;
            --hb-secondary: #3742fa;
            --hb-accent: #f59e0b;
            --hb-success: #10b981;
            --hb-text: #1f2937;
            --hb-muted: #6b7280;
            --hb-bg: #ffffff;
            --hb-card: #f9fafb;
        }

        .hb-logo-complete {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .hb-letters {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hb-letter-complete {
            display: inline-block;
            font-size: 96px;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em;
            line-height: 1;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: letterEntrance 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(30px) rotateX(90deg);
        }

        .hb-letter-complete:nth-child(1) {
            animation-delay: 0.1s;
        }

        .hb-letter-complete:nth-child(2) {
            animation-delay: 0.3s;
        }

        .hb-h-complete {
            background: linear-gradient(135deg, var(--hb-primary) 0%, var(--hb-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hb-b-complete {
            background: linear-gradient(135deg, var(--hb-primary) 0%, var(--hb-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hb-letter-complete::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.1), rgba(55, 66, 250, 0.1));
            border-radius: 16px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .hb-letter-complete:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .hb-letter-complete:hover {
            transform: translateY(-8px) scale(1.05);
            filter: drop-shadow(0 10px 25px rgba(255, 71, 87, 0.3));
        }

        @keyframes letterEntrance {
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
            }
        }

        .logo-container-complete {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 80%, rgba(255, 71, 87, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(55, 66, 250, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            position: relative;
            overflow: hidden;
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.1), rgba(55, 66, 250, 0.1));
            animation: floatShape 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 60px;
            height: 60px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 40px;
            height: 40px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.15), rgba(55, 66, 250, 0.15));
        }

        .shape:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 30px;
            height: 30px;
            top: 30%;
            right: 30%;
            animation-delay: 6s;
            background: linear-gradient(45deg, rgba(255, 71, 87, 0.12), rgba(55, 66, 250, 0.12));
        }

        @keyframes floatShape {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.6;
            }
        }

        .logo-card-complete {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 80px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: cardSlideIn 1.5s ease-out;
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.8);
                filter: blur(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .logo-subtitle-complete {
            font-size: 24px;
            color: var(--hb-text);
            margin-top: 32px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.02em;
            animation: textFadeIn 1s ease-out 0.8s both;
        }

        .logo-description {
            font-size: 16px;
            color: var(--hb-muted);
            margin-top: 16px;
            text-align: center;
            font-weight: 400;
            line-height: 1.6;
            animation: textFadeIn 1s ease-out 1s both;
        }

        @keyframes textFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-elements-complete {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-top: 48px;
        }

        .brand-line {
            height: 2px;
            background: linear-gradient(90deg, var(--hb-primary), var(--hb-secondary));
            border-radius: 1px;
            animation: lineGrow 1.5s ease-out 1.2s both;
        }

        .brand-line.left {
            width: 80px;
        }

        .brand-line.right {
            width: 80px;
        }

        @keyframes lineGrow {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 80px;
                opacity: 1;
            }
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--hb-accent), var(--hb-success));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            animation: iconBounce 0.8s ease-out 1.4s both;
        }

        @keyframes iconBounce {
            from {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @media (max-width: 768px) {
            .hb-letter-complete {
                font-size: 72px;
            }

            .logo-card-complete {
                padding: 48px;
                margin: 20px;
            }

            .logo-subtitle-complete {
                font-size: 20px;
            }

            .brand-line {
                width: 60px;
            }

            .brand-line.left,
            .brand-line.right {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container-complete">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>

        <div class="logo-card-complete">
            <div class="hb-logo-complete">
                <div class="hb-letters">
                    <span class="hb-letter-complete hb-h-complete">H</span>
                    <span class="hb-letter-complete hb-b-complete">B</span>
                </div>
            </div>

            <div class="logo-subtitle-complete">HB Platform</div>
            <div class="logo-description">
                Professional Multi-Shop Order Management System<br>
                Streamlining business operations with intelligent technology
            </div>

            <div class="brand-elements-complete">
                <div class="brand-line left"></div>
                <div class="brand-icon">★</div>
                <div class="brand-line right"></div>
            </div>
        </div>
    </div>

    <script>
        // 添加交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const letters = document.querySelectorAll('.hb-letter-complete');

            letters.forEach((letter, index) => {
                letter.addEventListener('mouseenter', function() {
                    // 添加点击涟漪效果
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'rgba(255, 255, 255, 0.3)';
                    ripple.style.transform = 'scale(0)';
                    ripple.style.animation = 'ripple 0.6s linear';
                    ripple.style.width = '20px';
                    ripple.style.height = '20px';
                    ripple.style.left = '50%';
                    ripple.style.top = '50%';
                    ripple.style.transformOrigin = 'center';
                    ripple.style.pointerEvents = 'none';

                    this.appendChild(ripple);

                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });
        });

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
